# SITE SETUP
# Guide: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

# Appearance
appearance:
  theme_day: hololith
  theme_night: hololith
  font: cyberpunk
  font_size: L
  accent_color: '#00f7ff'

media:
  # Featured image crop used by card views (e.g. Latest News, Projects).
  card_fill: "1200x675"
  # Default crop anchor for cards; can be overridden per page with `image.focal_point`.
  card_focal_point: "Center"

# SEO

marketing:
  seo:
    site_type: Organization
    local_business_type: ''
    org_name: 'HoloLith'
    description: 'HoloLith research group'
    twitter: ''
  analytics:
    google_analytics: ''
    baidu_tongji: ''
    google_tag_manager: ''
    microsoft_clarity: ''
  verification:
    google: ''
    baidu: ''

# Site header

header:
  logo: ''
  logo_alt: HoloLith
  navbar:
    enable: true
    align: r
    show_logo: True
    show_language: false
    show_day_night: true
    show_search: true
    highlight_active_link: false
  affiliations:
    enable: true
    logo_height: 100
    items:
      # Put logo files in `static/media/affiliations/` and reference them as `/media/affiliations/file.ext`
      - name: University of Naples Federico II
        image: /media/affiliations/university.png
        image_dark: /media/affiliations/university_dark.png
        url: https://www.unina.it/
        new_tab: true

      - name: Department of Physics "Ettore Pancini"
        image: /media/affiliations/department_.png
        image_dark: /media/affiliations/department_dark.png
        url: https://www.fisica.unina.it/
        new_tab: false

       #- name: HoloLith
       #  image: /media/affiliations/logo.png
       #  url: https://www.hypermash.eu/
       #  new_tab: false



# Site footer

footer:
  copyright:
    notice: '© {year} HoloLith. All rights reserved.'
    license:
      enable: false
      allow_derivatives: false
      share_alike: true
      allow_commercial: false

# Localization

locale:
  date_format: 'Jan 2, 2006'
  time_format: '3:04 PM'
  address_format: en-us

# Site features

features:
  syntax_highlighter:
    enable: false
    extra_languages:
      - r
      - latex
  math:
    enable: false
  privacy_pack:
    enable: false
  repository:
    url: 'https://github.com/davvvd/hololith-site'
    content_dir: content
    branch: main
  avatar:
    gravatar: false
    shape: circle
  comment:
    provider: ''
    disqus:
      shortname: ''
      show_count: true
    commento:
      url: ''
    giscus:
      repo: ''
      repo_id: ''
      category: ''
      category_id: ''
  search:
    provider: wowchemy
    algolia:
      app_id: ''
      api_key: ''
      index_name: ''
      show_logo: false
  map:
    provider: 'mapnik'
    api_key: ''
    zoom: 15

# Extensions

extensions:
  decap_cms:
    branch: main
    local_backend: false
  academicons:
    enable: true

# Citation style

publications:
  date_format: January 2006
  citation_style: apa
