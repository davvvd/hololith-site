# Theme metadata
name = "HoloLith"

[light]
  # Primary color for buttons and highlights
  primary = "#8200c8"

  # Links
  link = "#00f7ff"
  link_hover = "#ff4200"
  link_decoration = "none"

  # Background
  background = "rgb(255, 255, 255)"

  # Navigation
  menu_primary = "rgb(244, 250, 255)"
  menu_text = "#2b2b2b"
  menu_text_active = "#ff4200"
  menu_title = "#111111"

  # Home sections
  home_section_odd = "#ededed"
  home_section_even = "#ededed"

[dark]
  primary = "#00f7ff"
  background = "rgb(16, 18, 26)"
  link = "#00f7ff"
  link_hover = "#ff4200"
  menu_primary = "rgb(59, 59, 59)"
  menu_text = "rgba(255,255,255,.8)"
  menu_text_active = "#ff4200"
  menu_title = "#ffffff"
  home_section_odd = "rgb(26, 28, 40)"
  home_section_even = "rgb(19, 21, 31)"
